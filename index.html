<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dopamine Timer">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <title>Dopamine Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0f172a; 
            color: #f8fafc; 
            overscroll-behavior-y: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.3); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 255, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }
        .active-node {
            animation: pulse-ring 2s infinite;
            border: 2px solid white;
        }
        
        .completed-node {
            opacity: 0.4;
            filter: grayscale(100%);
        }

        .numpad-btn:active {
            transform: scale(0.95);
            background-color: #334155;
        }
        
        input, textarea {
            -webkit-user-select: auto;
            user-select: auto;
        }
    </style>
</head>
<body class="h-screen w-screen flex justify-center overflow-hidden bg-black">

    <audio id="silentAudio" loop playsinline>
        <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
    </audio>

    <div class="w-full max-w-md h-full bg-slate-900 flex flex-col relative shadow-2xl">
        
        <div class="px-6 py-4 bg-slate-900/80 backdrop-blur-md border-b border-slate-800 z-20 flex justify-between items-start shadow-sm relative">
            <div class="flex flex-col flex-1">
                <span class="text-[10px] text-slate-400 font-semibold tracking-wider uppercase mb-0.5">Toplam Geçen</span>
                <div class="flex flex-col items-end w-fit">
                    <span id="totalElapsedDisplay" class="text-2xl font-bold text-white tabular-nums tracking-tight leading-none">00:00:00</span>
                    <span id="emergencyTimeDisplay" class="text-[10px] text-slate-500 font-mono hidden mt-1">(+00:00)</span>
                </div>
            </div>

            <div class="flex justify-center absolute left-1/2 transform -translate-x-1/2 top-3">
                <button id="emergencyBtn" class="flex flex-col items-center justify-center text-red-500 hover:text-red-400 transition-colors group outline-none" onclick="toggleEmergencyBreak()">
                    <div id="emergencyIcon" class="w-9 h-9 rounded-full bg-red-600/20 border border-red-500/50 flex items-center justify-center shadow-[0_0_15px_rgba(220,38,38,0.4)] relative group-active:scale-95 transition-transform">
                        <div class="w-3 h-3 bg-red-500 rounded-full animate-ping absolute"></div>
                        <div class="w-3 h-3 bg-red-500 rounded-full relative z-10 shadow-[0_0_8px_rgba(220,38,38,0.8)]"></div>
                    </div>
                    <span id="emergencyText" class="text-[8px] font-bold mt-1.5 uppercase tracking-widest text-slate-400">Acil Mola</span>
                </button>
            </div>

            <div class="flex flex-col text-right flex-1 items-end">
                <span class="text-[10px] text-indigo-400 font-semibold tracking-wider uppercase">Toplam Çalışma</span>
                <span id="totalWorkDisplay" class="text-2xl font-bold text-indigo-300 tabular-nums tracking-tight">00:00:00</span>
                <span id="sessionStatsDisplay" class="text-[10px] text-slate-500/70 font-mono mt-0.5 tracking-wider">W:0 / B:0</span>
            </div>
        </div>

        <div class="px-6 py-3 bg-slate-900 border-b border-slate-800 z-20 flex justify-center shadow-md relative">
            <button id="topStartBtn" class="w-full bg-slate-700 text-slate-500 rounded-xl py-3 font-bold transition-all outline-none opacity-50 cursor-not-allowed" onclick="startGlobalTimer()" disabled>SÜREYİ BAŞLAT</button>
        </div>

        <div id="timelineContainer" class="flex-1 overflow-y-auto no-scrollbar p-6 relative pb-32">
            <!-- Node'lar buraya js ile basılıyor. Hizalama js içinden yönetilecek -->
            <div id="nodesWrapper" class="flex flex-col gap-6 relative z-10 min-h-full"></div>
        </div>

        <div class="bg-slate-950 p-5 rounded-t-3xl shadow-[0_-15px_40px_rgba(0,0,0,0.5)] z-20 pb-8 flex flex-col transition-all duration-300">
            
            <button onclick="toggleNumpad()" class="w-full flex justify-center pb-3 pt-1 mb-2 text-slate-500 hover:text-slate-300 outline-none" tabindex="-1">
                <svg id="numpadToggleIcon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="transition-transform duration-300"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </button>

            <div id="numpadContent" class="flex flex-col">
                <div class="flex items-center justify-between bg-slate-900 rounded-2xl p-4 mb-4 border border-slate-800">
                    <span id="inputDisplay" class="text-4xl font-bold text-slate-300 tracking-widest transition-colors duration-200">0</span>
                    <span class="text-slate-500 font-semibold text-lg">DK</span>
                </div>

                <div class="grid grid-cols-3 gap-3">
                    <button class="numpad-btn bg-slate-800 rounded-2xl py-4 text-2xl font-semibold transition-transform outline-none" tabindex="-1" onclick="appendNum(1)">1</button>
                    <button class="numpad-btn bg-slate-800 rounded-2xl py-4 text-2xl font-semibold transition-transform outline-none" tabindex="-1" onclick="appendNum(2)">2</button>
                    <button class="numpad-btn bg-slate-800 rounded-2xl py-4 text-2xl font-semibold transition-transform outline-none" tabindex="-1" onclick="appendNum(3)">3</button>
                    <button class="numpad-btn bg-slate-800 rounded-2xl py-4 text-2xl font-semibold transition-transform outline-none" tabindex="-1" onclick="appendNum(4)">4</button>
                    <button class="numpad-btn bg-slate-800 rounded-2xl py-4 text-2xl font-semibold transition-transform outline-none" tabindex="-1" onclick="appendNum(5)">5</button>
                    <button class="numpad-btn bg-slate-800 rounded-2xl py-4 text-2xl font-semibold transition-transform outline-none" tabindex="-1" onclick="appendNum(6)">6</button>
                    <button class="numpad-btn bg-slate-800 rounded-2xl py-4 text-2xl font-semibold transition-transform outline-none" tabindex="-1" onclick="appendNum(7)">7</button>
                    <button class="numpad-btn bg-slate-800 rounded-2xl py-4 text-2xl font-semibold transition-transform outline-none" tabindex="-1" onclick="appendNum(8)">8</button>
                    <button class="numpad-btn bg-slate-800 rounded-2xl py-4 text-2xl font-semibold transition-transform outline-none" tabindex="-1" onclick="appendNum(9)">9</button>
                    
                    <button class="numpad-btn bg-red-900/30 text-red-400 rounded-2xl py-4 text-xl font-bold transition-transform outline-none" tabindex="-1" onclick="deleteNum()">DEL</button>
                    <button class="numpad-btn bg-slate-800 rounded-2xl py-4 text-2xl font-semibold transition-transform outline-none" tabindex="-1" onclick="appendNum(0)">0</button>
                    
                    <button id="toggleAddBtn" class="bg-indigo-600 text-white rounded-2xl py-4 text-xs font-bold shadow-lg shadow-indigo-900/50 transition-transform active:scale-95 flex flex-col items-center justify-center gap-1 outline-none" tabindex="-1" onclick="handleAddToggle()">
                        <div class="w-4 h-4 bg-white rounded-md shadow-sm" id="toggleAddShape"></div>
                        <span id="toggleAddText" class="tracking-wide">ÇALIŞMA EKLE</span>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- Silme Onay Modalı -->
    <div id="deleteConfirmModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center opacity-0 transition-opacity duration-200">
        <div class="bg-slate-800 p-6 rounded-3xl shadow-2xl border border-slate-700 max-w-[320px] w-full mx-4 transform scale-95 transition-transform duration-200" id="deleteConfirmCard">
            <h3 class="text-lg font-bold text-white mb-2 text-center">Son Öğeyi Sil?</h3>
            <p class="text-slate-400 text-sm text-center mb-6">Zaman çizelgesine eklediğiniz son süreyi silmek istediğinize emin misiniz?</p>
            <div class="flex gap-3">
                <button onclick="closeDeleteConfirm()" class="flex-1 py-3 rounded-xl bg-slate-700 text-white font-medium hover:bg-slate-600 transition-colors outline-none">Hayır</button>
                <button onclick="executeDeleteLastNode()" class="flex-1 py-3 rounded-xl bg-red-600 text-white font-bold hover:bg-red-500 transition-colors ring-2 ring-red-400 ring-offset-2 ring-offset-slate-800 outline-none" id="confirmDeleteYesBtn">Evet</button>
            </div>
        </div>
    </div>

    <script>
        let isRunning = false;
        let lastTickTime = Date.now();
        let remainderMs = 0; 
        
        let totalElapsedSeconds = 0;
        let totalWorkSeconds = 0;
        
        let isEmergencyBreak = false;
        let emergencyBreakMs = 0;

        let currentInputValue = "";
        let suggestedValue = "";
        
        let nodes = [];
        let activeNodeIndex = -1;

        let nextNodeType = 'work';
        let isNumpadExpanded = true;
        let isConfirmDeleteOpen = false;

        let audioCtx = null;
        let timerWorker = null;

        const workerCode = `
            let timer = null;
            self.onmessage = function(e) {
                if (e.data === 'start') {
                    if (timer) clearInterval(timer);
                    timer = setInterval(() => self.postMessage('tick'), 200);
                } else if (e.data === 'stop') {
                    if (timer) clearInterval(timer);
                    timer = null;
                }
            };
        `;
        const blob = new Blob([workerCode], {type: 'application/javascript'});
        timerWorker = new Worker(URL.createObjectURL(blob));
        timerWorker.onmessage = function(e) {
            if (e.data === 'tick') tick();
        };

        const inputDisplay = document.getElementById('inputDisplay');
        const nodesWrapper = document.getElementById('nodesWrapper');
        const totalElapsedDisplay = document.getElementById('totalElapsedDisplay');
        const totalWorkDisplay = document.getElementById('totalWorkDisplay');
        const topStartBtn = document.getElementById('topStartBtn');
        const timelineContainer = document.getElementById('timelineContainer');
        const silentAudio = document.getElementById('silentAudio');

        function formatTime(totalSeconds) {
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function formatMMSS(totalSeconds) {
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            return audioCtx;
        }

        // --- Just In Time Audio Playback ---
        function playCountdown(type) {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();

                if (type === 'long') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(400, ctx.currentTime);
                    gain.gain.setValueAtTime(0, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.1);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
                    
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.8);
                } else if (type === 'short') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(600, ctx.currentTime);
                    gain.gain.setValueAtTime(0, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
                    
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.15);
                }
            } catch(e) {
                console.warn("Countdown audio error:", e);
            }
        }

        function playBeep(type) {
            try {
                const ctx = getAudioContext();
                
                if (type === 'break') {
                    const playDeepBeep = (startTime) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(450, startTime);
                        
                        gain.gain.setValueAtTime(0, startTime);
                        gain.gain.linearRampToValueAtTime(0.6, startTime + 0.05);
                        gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.6);
                        
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        
                        osc.start(startTime);
                        osc.stop(startTime + 0.75);
                    };
                    
                    playDeepBeep(ctx.currentTime);
                    playDeepBeep(ctx.currentTime + 0.75);
                    playDeepBeep(ctx.currentTime + 1.50);
                    playDeepBeep(ctx.currentTime + 2.25);
                } else {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(600, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
                    
                    gain.gain.setValueAtTime(0, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1);
                    
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 1);
                }
            } catch(e) {
                console.warn("Audio error:", e);
            }
        }

        function manageStartButtonState() {
            if (nodes.length === 0) {
                topStartBtn.disabled = true;
                topStartBtn.className = "w-full bg-slate-700 text-slate-500 rounded-xl py-3 font-bold transition-all outline-none opacity-50 cursor-not-allowed";
            } else if (!isRunning) {
                topStartBtn.disabled = false;
                topStartBtn.className = "w-full bg-emerald-600 text-white rounded-xl py-3 font-bold shadow-lg shadow-emerald-900/50 transition-colors active:scale-95 outline-none";
                topStartBtn.textContent = 'SÜREYİ BAŞLAT';
            }
        }

        function updateDisplays() {
            totalElapsedDisplay.textContent = formatTime(totalElapsedSeconds);
            totalWorkDisplay.textContent = formatTime(totalWorkSeconds);
            
            const eSecs = Math.floor(emergencyBreakMs / 1000);
            const emDisplay = document.getElementById('emergencyTimeDisplay');
            emDisplay.textContent = `(+${formatMMSS(eSecs)})`;

            let completedWorkCount = nodes.filter(n => n.type === 'work' && n.state === 'completed').length;
            let completedBreakCount = nodes.filter(n => n.type === 'break' && n.state === 'completed').length;
            document.getElementById('sessionStatsDisplay').textContent = `W:${completedWorkCount} / B:${completedBreakCount}`;
        }

        function updateInputDisplay() {
            if (currentInputValue !== "") {
                inputDisplay.textContent = currentInputValue;
                inputDisplay.classList.remove('text-slate-500', 'opacity-50');
                inputDisplay.classList.add('text-slate-300');
            } else if (suggestedValue !== "") {
                inputDisplay.textContent = suggestedValue;
                inputDisplay.classList.remove('text-slate-300');
                inputDisplay.classList.add('text-slate-500', 'opacity-50');
            } else {
                inputDisplay.textContent = "0";
                inputDisplay.classList.remove('text-slate-500', 'opacity-50');
                inputDisplay.classList.add('text-slate-300');
            }
        }

        function appendNum(num) {
            getAudioContext();
            if (currentInputValue.length < 4) { 
                currentInputValue += num.toString();
                updateInputDisplay();
            }
        }

        function deleteNum() {
            getAudioContext();
            currentInputValue = currentInputValue.slice(0, -1);
            updateInputDisplay();
        }

        function toggleNumpad() {
            isNumpadExpanded = !isNumpadExpanded;
            const content = document.getElementById('numpadContent');
            const icon = document.getElementById('numpadToggleIcon');
            
            if (isNumpadExpanded) {
                content.classList.remove('hidden');
                icon.style.transform = 'rotate(0deg)';
            } else {
                content.classList.add('hidden');
                icon.style.transform = 'rotate(180deg)';
            }
        }

        function toggleEmergencyBreak() {
            getAudioContext();
            isEmergencyBreak = !isEmergencyBreak;
            
            const btn = document.getElementById('emergencyBtn');
            const icon = document.getElementById('emergencyIcon');
            const text = document.getElementById('emergencyText');
            const display = document.getElementById('emergencyTimeDisplay');
            const innerDots = icon.querySelectorAll('div');

            if (isEmergencyBreak) {
                btn.classList.replace('text-red-500', 'text-emerald-500');
                btn.classList.replace('hover:text-red-400', 'hover:text-emerald-400');
                icon.className = "w-9 h-9 rounded-full bg-emerald-600/20 border border-emerald-500/50 flex items-center justify-center shadow-[0_0_15px_rgba(16,185,129,0.4)] relative group-active:scale-95 transition-transform";
                innerDots.forEach(d => d.classList.replace('bg-red-500', 'bg-emerald-500'));
                text.textContent = "DEVAM ET";
                display.classList.remove('hidden');
                
                lastTickTime = Date.now();
                if (!isRunning && activeNodeIndex >= nodes.length) {
                    timerWorker.postMessage('start');
                }
            } else {
                btn.classList.replace('text-emerald-500', 'text-red-500');
                btn.classList.replace('hover:text-emerald-400', 'hover:text-red-400');
                icon.className = "w-9 h-9 rounded-full bg-red-600/20 border border-red-500/50 flex items-center justify-center shadow-[0_0_15px_rgba(220,38,38,0.4)] relative group-active:scale-95 transition-transform";
                innerDots.forEach(d => d.classList.replace('bg-emerald-500', 'bg-red-500'));
                text.textContent = "ACİL MOLA";
                
                lastTickTime = Date.now();
                if (!isRunning && activeNodeIndex >= nodes.length) {
                    timerWorker.postMessage('stop');
                }
            }
        }

        function recalculateSuggestionState() {
            if (nodes.length === 0) {
                nextNodeType = 'work';
                suggestedValue = "";
            } else {
                const lastNode = nodes[nodes.length - 1];
                if (lastNode.type === 'work') {
                    nextNodeType = 'break';
                    let wMins = lastNode.duration / 60;
                    
                    if (wMins <= 8) {
                        suggestedValue = Math.max(1, Math.ceil(wMins / 2)).toString();
                    } else {
                        let lastBreakNode = [...nodes].reverse().find(n => n.type === 'break');
                        let bMins = lastBreakNode ? (lastBreakNode.duration / 60) : 0;
                        let formulaResult = (wMins / 3) + (1 + 0.2 * bMins);
                        suggestedValue = Math.max(1, Math.round(formulaResult)).toString();
                    }
                } else {
                    nextNodeType = 'work';
                    const lastWorkNode = [...nodes].reverse().find(n => n.type === 'work');
                    if (lastWorkNode) {
                        let lastWorkMins = lastWorkNode.duration / 60;
                        
                        if (lastWorkMins <= 4) {
                            suggestedValue = Math.max(1, Math.round(lastWorkMins * 2)).toString();
                        } else if (lastWorkMins < 30) {
                            let nextWork = -0.0152 * Math.pow(lastWorkMins, 2) + 1.488 * lastWorkMins + 2.112;
                            suggestedValue = Math.max(lastWorkMins + 1, Math.round(nextWork)).toString();
                        } else {
                            let nextWork = lastWorkMins * 1.1; 
                            suggestedValue = Math.max(lastWorkMins + 1, Math.round(nextWork)).toString();
                        }
                    } else {
                        suggestedValue = "";
                    }
                }
            }

            const btn = document.getElementById('toggleAddBtn');
            const shape = document.getElementById('toggleAddShape');
            const text = document.getElementById('toggleAddText');

            if (nextNodeType === 'work') {
                btn.className = "bg-indigo-600 text-white rounded-2xl py-4 text-xs font-bold shadow-lg shadow-indigo-900/50 transition-transform active:scale-95 flex flex-col items-center justify-center gap-1 outline-none";
                shape.className = "w-4 h-4 bg-white rounded-md shadow-sm";
                text.textContent = "ÇALIŞMA EKLE";
            } else {
                btn.className = "bg-teal-600 text-white rounded-2xl py-4 text-xs font-bold shadow-lg shadow-teal-900/50 transition-transform active:scale-95 flex flex-col items-center justify-center gap-1 outline-none";
                shape.className = "w-4 h-4 bg-white rounded-full shadow-sm";
                text.textContent = "MOLA EKLE";
            }
            updateInputDisplay();
            manageStartButtonState();
        }

        function handleAddToggle() {
            getAudioContext();
            let minutes = parseInt(currentInputValue, 10);
            
            if (isNaN(minutes) || minutes <= 0) {
                if (suggestedValue !== "") {
                    minutes = parseInt(suggestedValue, 10);
                } else {
                    return; 
                }
            }

            addNode(nextNodeType, minutes);
            currentInputValue = "";
            recalculateSuggestionState();
        }
        
        function promptDeleteLastNode() {
            if (nodes.length === 0) return;
            isConfirmDeleteOpen = true;
            const modal = document.getElementById('deleteConfirmModal');
            const card = document.getElementById('deleteConfirmCard');
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                card.classList.remove('scale-95');
                document.getElementById('confirmDeleteYesBtn').focus();
            }, 10);
        }

        function closeDeleteConfirm() {
            isConfirmDeleteOpen = false;
            const modal = document.getElementById('deleteConfirmModal');
            const card = document.getElementById('deleteConfirmCard');
            
            modal.classList.add('opacity-0');
            card.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 200);
            
            if (document.activeElement) {
                document.activeElement.blur();
            }
        }

        function executeDeleteLastNode() {
            if (nodes.length > 0) {
                const lastNode = nodes[nodes.length - 1];
                deleteNode(lastNode.id);
            }
            closeDeleteConfirm();
        }

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            getAudioContext();

            if (isConfirmDeleteOpen) {
                if (e.key === 'Enter') {
                    executeDeleteLastNode();
                    e.preventDefault();
                } else if (e.key === 'Escape') {
                    closeDeleteConfirm();
                    e.preventDefault();
                }
                return;
            }

            if (e.key >= '0' && e.key <= '9') {
                appendNum(parseInt(e.key));
            } else if (e.key === 'Backspace') {
                deleteNum();
            } else if (e.key === 'Enter') {
                handleAddToggle();
                e.preventDefault();
            } else if (e.key === 'Delete') {
                promptDeleteLastNode();
                e.preventDefault();
            }
        });

        function deleteNode(id) {
            const index = nodes.findIndex(n => n.id === id);
            if (index === -1) return;

            const wasActive = (index === activeNodeIndex);
            nodes.splice(index, 1);

            if (index < activeNodeIndex) {
                activeNodeIndex--;
            }

            if (wasActive) {
                if (activeNodeIndex < nodes.length) {
                    nodes[activeNodeIndex].state = 'active';
                } else {
                    activeNodeIndex = -1;
                }
            }

            renderTimeline();
            recalculateSuggestionState();
        }

        function renderTimeline() {
            // Hizalama Problemi Çözümü: Çizgi artık nodesWrapper'ın doğrudan içine z-0 ile mutlak hizalı (left-7 tam merkeze denk geliyor)
            nodesWrapper.innerHTML = `<div class="absolute left-7 top-0 bottom-0 w-px border-l-2 border-dashed border-slate-700 z-0"></div>`;
            
            if (nodes.length === 0) {
                nodesWrapper.innerHTML += `
                    <div class="flex items-center gap-6 opacity-50 relative z-10">
                        <div class="w-14 flex justify-center">
                            <div class="w-3 h-3 bg-slate-600 rounded-full"></div>
                        </div>
                        <div class="text-slate-500 text-sm">Bekleniyor... Aşağıdan süre ekleyin.</div>
                    </div>
                `;
                return;
            }

            nodes.forEach((node, index) => {
                const el = document.createElement('div');
                el.className = `flex items-center gap-6 transition-all duration-500 ease-in-out relative z-10 ${node.state === 'completed' ? 'completed-node' : ''}`;
                el.id = `node-${node.id}`;

                let shapeClass = "";
                let bgClass = "";
                if (node.type === 'work') {
                    shapeClass = "rounded-2xl"; 
                    bgClass = "bg-indigo-600 shadow-indigo-900/50";
                } else {
                    shapeClass = "rounded-full"; 
                    bgClass = "bg-teal-600 shadow-teal-900/50";
                }

                let activeClass = node.state === 'active' ? 'active-node' : '';
                let isLastNode = index === nodes.length - 1;
                let deleteBtnHtml = isLastNode ? `
                    <button onclick="promptDeleteLastNode()" class="p-2 ml-2 text-slate-600 hover:text-red-400 hover:bg-slate-700/50 rounded-xl transition-all active:scale-90 outline-none" title="Sil">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </button>
                ` : '';

                el.innerHTML = `
                    <div class="relative flex-shrink-0 flex justify-center w-14">
                        <div class="w-14 h-14 ${shapeClass} ${bgClass} shadow-lg flex items-center justify-center z-10 ${activeClass}">
                            <span class="text-white font-bold text-xs opacity-70">${node.type === 'work' ? 'W' : 'B'}</span>
                        </div>
                    </div>
                    <div class="flex items-center w-full bg-slate-800/80 p-4 rounded-2xl border border-slate-700/50 pr-2">
                        <div class="flex-1 flex flex-col">
                            <div class="flex justify-between items-center mb-1 pr-2">
                                <span class="font-bold tracking-wide ${node.type === 'work' ? 'text-indigo-400' : 'text-teal-400'} uppercase text-sm">
                                    ${node.type === 'work' ? 'Çalışma' : 'Mola'}
                                </span>
                                <span class="text-xs text-slate-500 font-medium">${node.duration / 60} dk</span>
                            </div>
                            <div class="text-3xl font-bold font-mono tracking-tighter text-slate-200" id="time-${node.id}">
                                ${formatMMSS(node.remaining)}
                            </div>
                        </div>
                        ${deleteBtnHtml}
                    </div>
                `;
                nodesWrapper.appendChild(el);
            });
        }

        function updateActiveNodeDisplay() {
            if (activeNodeIndex >= 0 && activeNodeIndex < nodes.length) {
                const activeNode = nodes[activeNodeIndex];
                const timeEl = document.getElementById(`time-${activeNode.id}`);
                if (timeEl) {
                    timeEl.textContent = formatMMSS(activeNode.remaining);
                }
            }
        }

        function addNode(type, minutes) {
            if (isNaN(minutes) || minutes <= 0) return;

            const newNode = {
                id: Date.now() + Math.random().toString(36).substring(2, 9),
                type: type,
                duration: minutes * 60,
                remaining: minutes * 60,
                state: 'pending'
            };

            nodes.push(newNode);
            
            if (isRunning && activeNodeIndex >= nodes.length - 1) {
                activeNodeIndex = nodes.length - 1;
                nodes[activeNodeIndex].state = 'active';
            }

            renderTimeline();
            manageStartButtonState();

            setTimeout(() => {
                const container = document.getElementById('timelineContainer');
                if (container) {
                    container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
                }
            }, 50);
        }

        function tick() {
            let now = Date.now();
            let deltaMs = now - lastTickTime;
            lastTickTime = now;
            
            // Gerçek zaman filtresi (Eğer delta > 2sn ise cihaz uykudan uyanmış demektir, geri sayım/bildirimleri topluca çalmamak için)
            let isRealTime = (deltaMs < 2000);

            if (isEmergencyBreak) {
                emergencyBreakMs += deltaMs;
                updateDisplays();
                return;
            }

            if (!isRunning) return;

            remainderMs += deltaMs;
            let lastCompletedType = null;
            let timelineUpdated = false;

            while (remainderMs >= 1000) {
                remainderMs -= 1000;

                if (activeNodeIndex >= 0 && activeNodeIndex < nodes.length) {
                    totalElapsedSeconds++;
                    let currentNode = nodes[activeNodeIndex];
                    
                    if (currentNode.type === 'work') {
                        totalWorkSeconds++;
                    }

                    currentNode.remaining--;

                    // --- JIT (Just-In-Time) Audio Tetikleyicileri ---
                    if (isRealTime) {
                        if (currentNode.remaining === 10) {
                            playCountdown('long');
                        } else if (currentNode.remaining < 10 && currentNode.remaining > 0) {
                            playCountdown('short');
                        }
                    }

                    if (currentNode.remaining <= 0) {
                        currentNode.state = 'completed';
                        lastCompletedType = currentNode.type;
                        timelineUpdated = true;
                        
                        activeNodeIndex++;
                        if (activeNodeIndex < nodes.length) {
                            nodes[activeNodeIndex].state = 'active';
                        } else {
                            isRunning = false;
                            timerWorker.postMessage('stop');
                            silentAudio.pause();
                            
                            manageStartButtonState();
                            remainderMs = 0;
                        }
                    }
                } else {
                    remainderMs = 0;
                }
            }

            if (lastCompletedType) {
                playBeep(lastCompletedType);
            }
            if (timelineUpdated) {
                renderTimeline();
            }

            updateActiveNodeDisplay();
            updateDisplays();
        }

        function startGlobalTimer() {
            if (nodes.length === 0) return;
            getAudioContext();
            
            if (isRunning) return;
            if (activeNodeIndex >= nodes.length) return; 

            isRunning = true;
            lastTickTime = Date.now();
            remainderMs = 0;
            
            silentAudio.play().catch(()=>{});

            topStartBtn.classList.replace('bg-emerald-600', 'bg-slate-700');
            topStartBtn.classList.replace('text-white', 'text-slate-500');
            topStartBtn.textContent = 'AKIŞTA';
            topStartBtn.disabled = true;

            if (activeNodeIndex === -1) {
                activeNodeIndex = 0;
                nodes[activeNodeIndex].state = 'active';
                renderTimeline();
            }

            timerWorker.postMessage('start');
        }

        renderTimeline();
        updateInputDisplay();
        manageStartButtonState();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js', { scope: './' })
                    .then(reg => {
                        console.log('PWA Service Worker registered with scope:', reg.scope);
                    })
                    .catch(err => console.error('PWA Service Worker error:', err));
            });
        }

    </script>
</body>
</html>
