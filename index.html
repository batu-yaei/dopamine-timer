<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f1f5f9" media="(prefers-color-scheme: light)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Dopamine Timer">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <title>Dopamine Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');
        
        :root {
            --bg-main: #0f172a;
            --bg-panel: #1e293b;
            --bg-numpad: #020617;
            --bg-numpad-btn: #1e293b;
            --bg-numpad-btn-active: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --text-display: #cbd5e1;
            --border-color: #334155;
            --timeline-line: #334155;
            --drag-handle: #334155;
            --shadow-numpad: rgba(0,0,0,0.5);
            --bg-header: rgba(15, 23, 42, 0.8);
            --node-bg: rgba(30, 41, 59, 0.8);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-main: #f1f5f9;
                --bg-panel: #ffffff;
                --bg-numpad: #ffffff;
                --bg-numpad-btn: #f1f5f9;
                --bg-numpad-btn-active: #e2e8f0;
                --text-main: #0f172a;
                --text-muted: #64748b;
                --text-display: #334155;
                --border-color: #e2e8f0;
                --timeline-line: #cbd5e1;
                --drag-handle: #cbd5e1;
                --shadow-numpad: rgba(0,0,0,0.1);
                --bg-header: rgba(255, 255, 255, 0.8);
                --node-bg: rgba(255, 255, 255, 0.9);
            }
            
            #topStartBtn:disabled {
                background-color: #e2e8f0 !important;
                color: #64748b !important;
            }

            #deleteConfirmCard {
                background-color: #ffffff !important;
                border-color: #e2e8f0 !important;
            }
            #deleteConfirmCard h3 {
                color: #0f172a !important;
            }
            #deleteConfirmCard p {
                color: #64748b !important;
            }
            #deleteConfirmCard button[onclick="closeDeleteConfirm()"] {
                background-color: #f1f5f9 !important;
                color: #334155 !important;
            }
            #deleteConfirmCard button[onclick="closeDeleteConfirm()"]:hover {
                background-color: #e2e8f0 !important;
            }
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            overscroll-behavior-y: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        
        .bg-slate-900 { background-color: var(--bg-panel) !important; }
        .bg-slate-950 { background-color: var(--bg-numpad) !important; }
        .bg-black { background-color: var(--bg-main) !important; }
        .text-white { color: var(--text-main) !important; }
        .text-slate-400, .text-slate-500 { color: var(--text-muted) !important; }
        .text-slate-300 { color: var(--text-display) !important; }
        .border-slate-800, .border-slate-700, .border-slate-700\/50 { border-color: var(--border-color) !important; }
        .bg-slate-900\/80 { background-color: var(--bg-header) !important; }
        .bg-slate-800\/80 { background-color: var(--node-bg) !important; }
        
        .keep-white { color: #ffffff !important; }
        
        #dragHandle div { background-color: var(--drag-handle) !important; }
        
        .numpad-btn {
            background-color: var(--bg-numpad-btn) !important;
            color: var(--text-main) !important;
        }
        .numpad-btn.bg-red-900\/30 {
            background-color: rgba(220, 38, 38, 0.1) !important;
            color: #ef4444 !important;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes pulse-ring {
            0%   { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(148, 163, 184, 0.4); }
            70%  { transform: scale(1);    box-shadow: 0 0 0 10px rgba(148, 163, 184, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(148, 163, 184, 0); }
        }
        
        @keyframes gentle-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        
        .warning-node {
            animation: gentle-bounce 0.8s ease-in-out infinite;
        }
        
        .warning-bg {
            background-color: #f59e0b !important;
            border-color: #f59e0b !important;
            box-shadow: 0 10px 25px -5px rgba(245, 158, 11, 0.6) !important;
        }

        .active-node  { animation: pulse-ring 2s infinite; border: 2px solid var(--text-muted); }
        .completed-node { opacity: 0.5; filter: grayscale(100%); }
        .numpad-btn:active { transform: scale(0.95); background-color: var(--bg-numpad-btn-active) !important; }
        input, textarea { -webkit-user-select: auto; user-select: auto; }
        
        #nodesWrapper > div.absolute { border-color: var(--timeline-line) !important; }
        #numpadWrapper { box-shadow: 0 -25px 50px var(--shadow-numpad) !important; }
    </style>
</head>
<body class="h-screen w-screen flex justify-center overflow-hidden bg-black">

<div class="w-full max-w-md h-full bg-slate-900 flex flex-col relative shadow-2xl overflow-hidden">

    <!-- HEADER -->
    <div class="px-6 py-4 bg-slate-900/80 backdrop-blur-md border-b border-slate-800 z-20 flex justify-between items-start shadow-sm relative">
        <div class="flex flex-col flex-1">
            <span class="text-[10px] text-slate-400 font-semibold tracking-wider uppercase mb-0.5">Toplam Geçen</span>
            <div class="flex flex-col items-end w-fit">
                <span id="totalElapsedDisplay" class="text-2xl font-bold text-white tabular-nums tracking-tight leading-none">00:00:00</span>
                <span id="emergencyTimeDisplay" class="text-[10px] text-slate-500 font-mono hidden mt-1">(+00:00)</span>
            </div>
        </div>

        <div class="flex justify-center absolute left-1/2 transform -translate-x-1/2 top-3">
            <button id="emergencyBtn" class="flex flex-col items-center justify-center text-red-500 hover:text-red-400 transition-colors group outline-none opacity-30 pointer-events-none grayscale" onclick="toggleEmergencyBreak()" disabled>
                <div id="emergencyIcon" class="w-9 h-9 rounded-full bg-red-600/20 border border-red-500/50 flex items-center justify-center shadow-[0_0_15px_rgba(220,38,38,0.4)] relative group-active:scale-95 transition-transform">
                    <div class="w-3 h-3 bg-red-500 rounded-full animate-ping absolute"></div>
                    <div class="w-3 h-3 bg-red-500 rounded-full relative z-10 shadow-[0_0_8px_rgba(220,38,38,0.8)]"></div>
                </div>
                <span id="emergencyText" class="text-[8px] font-bold mt-1.5 uppercase tracking-widest text-slate-400">Acil Mola</span>
            </button>
        </div>

        <div class="flex flex-col text-right flex-1 items-end">
            <span class="text-[10px] text-indigo-400 font-semibold tracking-wider uppercase">Toplam Çalışma</span>
            <span id="totalWorkDisplay" class="text-2xl font-bold text-indigo-300 tabular-nums tracking-tight">00:00:00</span>
            <span id="sessionStatsDisplay" class="text-[10px] text-slate-500/70 font-mono mt-0.5 tracking-wider">W:0 / T:0</span>
        </div>
    </div>

    <!-- START BUTTON -->
    <div id="startContainer" class="px-6 py-3 bg-slate-900 border-b border-slate-800 z-20 flex justify-center shadow-md relative">
        <button id="topStartBtn" class="w-full bg-slate-700 text-slate-500 rounded-xl py-3 font-bold transition-all outline-none opacity-50 cursor-not-allowed" onclick="startGlobalTimer()" disabled>SÜREYİ BAŞLAT</button>
    </div>

    <!-- TIMELINE -->
    <div id="timelineContainer" class="flex-1 overflow-y-auto no-scrollbar p-6 relative">
        <div id="nodesWrapper" class="flex flex-col gap-6 relative z-10 min-h-full"></div>
    </div>

    <!-- DRAGGABLE NUMPAD BOTTOM SHEET -->
    <div id="numpadWrapper" class="absolute bottom-0 left-0 right-0 bg-slate-950 rounded-t-3xl shadow-[0_-25px_50px_rgba(0,0,0,0.5)] z-50 flex flex-col">
        <div id="dragHandle" class="w-full pt-5 pb-3 flex justify-center items-center cursor-grab active:cursor-grabbing touch-none">
            <div class="w-12 h-1.5 bg-slate-700 rounded-full"></div>
        </div>
        <div id="numpadContent" class="px-5 pb-8 flex flex-col">
            <div class="flex items-center justify-between bg-slate-900 rounded-2xl p-4 mb-4 border border-slate-800">
                <span id="inputDisplay" class="text-4xl font-bold text-slate-300 tracking-widest transition-colors duration-200">0</span>
                <span class="text-slate-500 font-semibold text-lg">DK</span>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <button class="numpad-btn bg-slate-800 rounded-2xl py-4 text-2xl font-semibold transition-transform outline-none" tabindex="-1" onclick="appendNum(1)">1</button>
                <button class="numpad-btn bg-slate-800 rounded-2xl py-4 text-2xl font-semibold transition-transform outline-none" tabindex="-1" onclick="appendNum(2)">2</button>
                <button class="numpad-btn bg-slate-800 rounded-2xl py-4 text-2xl font-semibold transition-transform outline-none" tabindex="-1" onclick="appendNum(3)">3</button>
                <button class="numpad-btn bg-slate-800 rounded-2xl py-4 text-2xl font-semibold transition-transform outline-none" tabindex="-1" onclick="appendNum(4)">4</button>
                <button class="numpad-btn bg-slate-800 rounded-2xl py-4 text-2xl font-semibold transition-transform outline-none" tabindex="-1" onclick="appendNum(5)">5</button>
                <button class="numpad-btn bg-slate-800 rounded-2xl py-4 text-2xl font-semibold transition-transform outline-none" tabindex="-1" onclick="appendNum(6)">6</button>
                <button class="numpad-btn bg-slate-800 rounded-2xl py-4 text-2xl font-semibold transition-transform outline-none" tabindex="-1" onclick="appendNum(7)">7</button>
                <button class="numpad-btn bg-slate-800 rounded-2xl py-4 text-2xl font-semibold transition-transform outline-none" tabindex="-1" onclick="appendNum(8)">8</button>
                <button class="numpad-btn bg-slate-800 rounded-2xl py-4 text-2xl font-semibold transition-transform outline-none" tabindex="-1" onclick="appendNum(9)">9</button>
                <button class="numpad-btn bg-red-900/30 text-red-400 rounded-2xl py-4 text-xl font-bold transition-transform outline-none" tabindex="-1" onclick="deleteNum()">DEL</button>
                <button class="numpad-btn bg-slate-800 rounded-2xl py-4 text-2xl font-semibold transition-transform outline-none" tabindex="-1" onclick="appendNum(0)">0</button>
                <button id="toggleAddBtn" class="bg-indigo-600 text-white rounded-2xl py-4 text-xs font-bold shadow-lg shadow-indigo-900/50 transition-transform active:scale-95 flex flex-col items-center justify-center gap-1 outline-none" tabindex="-1" onclick="handleAddToggle()">
                    <div class="w-4 h-4 bg-white rounded-md shadow-sm" id="toggleAddShape"></div>
                    <span id="toggleAddText" class="tracking-wide keep-white">ÇALIŞMA EKLE</span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- DELETE MODAL -->
<div id="deleteConfirmModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center opacity-0 transition-opacity duration-200">
    <div class="bg-slate-800 p-6 rounded-3xl shadow-2xl border border-slate-700 max-w-[320px] w-full mx-4 transform scale-95 transition-transform duration-200" id="deleteConfirmCard">
        <h3 class="text-lg font-bold text-white mb-2 text-center">Son Öğeyi Sil?</h3>
        <p class="text-slate-400 text-sm text-center mb-6">Zaman çizelgesine eklediğiniz son süreyi silmek istediğinize emin misiniz?</p>
        <div class="flex gap-3">
            <button onclick="closeDeleteConfirm()" class="flex-1 py-3 rounded-xl bg-slate-700 text-white font-medium hover:bg-slate-600 transition-colors outline-none">Hayır</button>
            <button onclick="executeDeleteLastNode()" class="flex-1 py-3 rounded-xl bg-red-600 text-white font-bold hover:bg-red-500 transition-colors ring-2 ring-red-400 ring-offset-2 ring-offset-slate-800 outline-none" id="confirmDeleteYesBtn">Evet</button>
        </div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let isRunning = false;
let totalElapsedSeconds = 0;
let totalWorkSeconds    = 0;
let remainderMs         = 0;
let lastTickTime        = Date.now();

let isEmergencyBreak       = false;
let emergencyBreakMs       = 0;
let emergencyBreakStartTime = null;

let currentInputValue = "";
let suggestedValue    = "";
let nodes             = [];
let activeNodeIndex   = -1;
let nextNodeType      = 'work';
let isConfirmDeleteOpen = false;
let isSequenceBroken  = false;

let audioCtx         = null;
let wakeLockSentinel = null;

// ═══════════════════════════════════════════════════════
// WEB WORKER (No bloat, robust interval)
// ═══════════════════════════════════════════════════════
const workerCode = `
    let timer = null;
    self.onmessage = function(e) {
        if (e.data === 'start') {
            if (timer) clearInterval(timer);
            timer = setInterval(() => self.postMessage('tick'), 250);
        } else if (e.data === 'stop') {
            if (timer) clearInterval(timer);
            timer = null;
        }
    };
`;
const timerWorker = new Worker(
    URL.createObjectURL(new Blob([workerCode], {type:'application/javascript'}))
);
timerWorker.onmessage = e => { if (e.data === 'tick') tick(); };

// ═══════════════════════════════════════════════════════
// DOM REFS
// ═══════════════════════════════════════════════════════
const inputDisplay        = document.getElementById('inputDisplay');
const nodesWrapper        = document.getElementById('nodesWrapper');
const totalElapsedDisplay = document.getElementById('totalElapsedDisplay');
const totalWorkDisplay    = document.getElementById('totalWorkDisplay');
const topStartBtn         = document.getElementById('topStartBtn');
const timelineContainer   = document.getElementById('timelineContainer');
const numpadWrapper       = document.getElementById('numpadWrapper');
const numpadContent       = document.getElementById('numpadContent');
const dragHandle          = document.getElementById('dragHandle');

// ═══════════════════════════════════════════════════════
// FORMAT
// ═══════════════════════════════════════════════════════
function formatTime(s) {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
function formatMMSS(s) {
    const isNeg = s < 0;
    const absS = Math.abs(s);
    const str = `${String(Math.floor(absS/60)).padStart(2,'0')}:${String(absS%60).padStart(2,'0')}`;
    return isNeg ? `-${str}` : str;
}

// ═══════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════
function getAudioContext() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
}

function playSparkleSound() {
    try {
        const ctx = getAudioContext();
        const now = ctx.currentTime;
        [800, 1200, 1600].forEach((freq, i) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now + i * 0.05);
            gain.gain.setValueAtTime(0, now + i * 0.05);
            gain.gain.linearRampToValueAtTime(0.2, now + i * 0.05 + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.05 + 0.15);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.onended = () => { try { osc.disconnect(); gain.disconnect(); } catch(e){} };
            osc.start(now + i * 0.05);
            osc.stop(now + i * 0.05 + 0.15);
        });
    } catch(e) {}
}

function playCountdown(type) {
    try {
        const ctx = getAudioContext();
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        if (type === 'long') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(400, ctx.currentTime);
            gain.gain.setValueAtTime(0, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.onended = () => { try { osc.disconnect(); gain.disconnect(); } catch(e){} };
            osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.8);
        } else {
            osc.type = 'square';
            osc.frequency.setValueAtTime(600, ctx.currentTime);
            gain.gain.setValueAtTime(0, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.onended = () => { try { osc.disconnect(); gain.disconnect(); } catch(e){} };
            osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.15);
        }
    } catch(e) { console.warn('Countdown audio:', e); }
}

function playBeep(type) {
    try {
        const ctx = getAudioContext();
        if (type === 'break') {
            [0, 0.30, 0.60, 0.90].forEach(offset => {
                const osc = ctx.createOscillator(), gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(450, ctx.currentTime + offset);
                gain.gain.setValueAtTime(0, ctx.currentTime + offset);
                gain.gain.linearRampToValueAtTime(0.6, ctx.currentTime + offset + 0.03);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + offset + 0.25);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.onended = () => { try { osc.disconnect(); gain.disconnect(); } catch(e){} };
                osc.start(ctx.currentTime + offset); osc.stop(ctx.currentTime + offset + 0.30);
            });
        } else {
            const osc = ctx.createOscillator(), gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(600, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.onended = () => { try { osc.disconnect(); gain.disconnect(); } catch(e){} };
            osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 1);
        }
    } catch(e) { console.warn('Beep audio:', e); }
}

// ═══════════════════════════════════════════════════════
// WAKE LOCK
// ═══════════════════════════════════════════════════════
async function acquireWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try {
        wakeLockSentinel = await navigator.wakeLock.request('screen');
        wakeLockSentinel.addEventListener('release', () => { wakeLockSentinel = null; });
    } catch(e) { console.warn('Wake Lock alınamadı:', e); }
}
function releaseWakeLock() {
    if (wakeLockSentinel) { wakeLockSentinel.release(); wakeLockSentinel = null; }
}
document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible' && isRunning && !wakeLockSentinel) {
        await acquireWakeLock();
    }
});

// ═══════════════════════════════════════════════════════
// EXTENSION NOTIFICATIONS & BADGE
// ═══════════════════════════════════════════════════════
function fireNotification(completedType) {
    let title, body;
    const allDone = activeNodeIndex >= nodes.length;
    
    if (allDone) {
        title = '🏆 Tüm süre tamamlandı!';
        body  = `${formatTime(totalWorkSeconds)} çalışma. Harika iş!`;
    } else if (completedType === 'work') {
        title = '✅ Çalışma bitti!';
        body  = `Mola zamanı — ${nodes[activeNodeIndex].duration / 60} dk`;
    } else {
        title = '💪 Mola bitti!';
        body  = `Çalışmaya devam — ${nodes[activeNodeIndex].duration / 60} dk`;
    }

    try {
        if (typeof chrome !== 'undefined' && chrome.notifications) {
            chrome.notifications.create({
                type: 'basic',
                iconUrl: 'icon-192.png',
                title: title,
                message: body,
                priority: 2
            });
        } 
        else if ('Notification' in window && Notification.permission === 'granted') {
            if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
                navigator.serviceWorker.ready.then(reg => {
                    reg.showNotification(title, { body: body, icon: './icon-192.png', tag: 'dopamine-timer', renotify: true, vibrate: [200, 100, 200] });
                });
            } else {
                new Notification(title, { body, icon: './icon-192.png', tag: 'dopamine-timer', renotify: true });
            }
        }
    } catch(e) { console.warn('Notification hatası:', e); }
}

function updateExtensionBadge(text, type) {
    window.dispatchEvent(new CustomEvent('DOPAMINE_BADGE', { detail: { text, type } }));

    if (typeof chrome !== 'undefined' && chrome.runtime && chrome.runtime.sendMessage) {
        const color = type === 'work' ? '#4f46e5' : '#0d9488';
        chrome.runtime.sendMessage({ type: 'UPDATE_BADGE', text: text, color: color }).catch(() => {});
    }
}

function requestNotificationPermission() {
    if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
    }
}

// ═══════════════════════════════════════════════════════
// NODE ACTIVATION & SKIP & +1 DK
// ═══════════════════════════════════════════════════════
function activateNode(index) {
    nodes[index].state = 'active';
    nodes[index].expectedEndAt = Date.now() + nodes[index].remaining * 1000;
}

function skipActiveNode() {
    getAudioContext();
    if (activeNodeIndex >= 0 && activeNodeIndex < nodes.length) {
        nodes[activeNodeIndex].remaining = 0;
        nodes[activeNodeIndex].expectedEndAt = Date.now();
        nodes[activeNodeIndex].wasSkipped = true;
        tick();
    }
}

function addOneMinute(id, btnElement) {
    getAudioContext();
    
    const index = nodes.findIndex(n => n.id === id);
    if (index === -1) return;
    
    const node = nodes[index];
    if (!node.addedMinutes) node.addedMinutes = 0;
    if (node.addedMinutes >= 5) return; 
    
    playSparkleSound();
    node.addedMinutes++;
    
    if (btnElement) {
        if (node.addedMinutes >= 5) {
            btnElement.classList.add('pointer-events-none');
        }
        
        const textEl = btnElement.querySelector('.add-btn-text');
        if (textEl) {
            let nextDisplay = node.addedMinutes < 5 ? node.addedMinutes + 1 : 5;
            
            textEl.textContent = `+${nextDisplay} DK`;
            textEl.classList.add('text-emerald-200', 'scale-125');
            setTimeout(() => {
                textEl.classList.remove('text-emerald-200', 'scale-125');
            }, 200);
        }
    }

    if (node.state === 'active' || node.inWarningPhase || node.inCooldown) {
        node.expectedEndAt += 60000;
        node.duration += 60; 
        
        if (node.ghostElapsedSec && node.ghostElapsedSec > 0) {
            totalWorkSeconds += node.ghostElapsedSec;
            node.ghostElapsedSec = 0;
        }
        
        const now = Date.now();
        node.remaining = Math.ceil((node.expectedEndAt - now) / 1000);
        node.visualRemaining = node.remaining;
        
        updateActiveNodeDisplay();
        updateDisplays();
    }
    
    if (node.addedMinutes >= 5) {
        node.keepWarningUntil = Date.now() + 1000;
        setTimeout(() => {
            if (nodes.find(n => n.id === id)) {
                node.inWarningPhase = false;
                node.inCooldown = false;
                node.keepWarningUntil = 0;
                renderTimeline();
            }
        }, 1000);
    } else {
        node.keepWarningUntil = Date.now() + 2000;
    }
}

// ═══════════════════════════════════════════════════════
// TICK
// ═══════════════════════════════════════════════════════
function tick() {
    const now = Date.now();
    const deltaMs = now - lastTickTime;
    lastTickTime = now;

    if (isEmergencyBreak) {
        updateDisplays();
        return;
    }
    
    if (!isRunning) return;

    if (deltaMs > 0 && deltaMs < 5000) { 
        remainderMs += deltaMs;
        while (remainderMs >= 1000) {
            remainderMs -= 1000;
            totalElapsedSeconds++;
            if (activeNodeIndex >= 0 && activeNodeIndex < nodes.length) {
                const activeN = nodes[activeNodeIndex];
                if (activeN.type === 'work') {
                    // Eksik 1 saniye hatasını çözmek için Date.now() yerine historicalNow kullanıldı
                    const historicalNow = now - remainderMs;
                    if (activeN.expectedEndAt >= historicalNow) {
                        totalWorkSeconds++;
                    } else {
                        if (!activeN.ghostElapsedSec) activeN.ghostElapsedSec = 0;
                        activeN.ghostElapsedSec++;
                    }
                }
            }
        }
    }

    let timelineNeedsRender = false;
    let lastCompletedType = null;
    let playAudioType = null;
    let didCatchUp = false;
    let didCooldownExpire = false;

    nodes.forEach(n => {
        if (n.state === 'completed' && n.cooldownExpiresAt && n.cooldownExpiresAt > 0 && now >= n.cooldownExpiresAt) {
            n.cooldownExpiresAt = 0;
            didCooldownExpire = true;
        }
    });
    if (didCooldownExpire) timelineNeedsRender = true;

    while (activeNodeIndex >= 0 && activeNodeIndex < nodes.length) {
        const node = nodes[activeNodeIndex];
        const exactRemainingMs = node.expectedEndAt - now;
        const newRemaining = Math.ceil(exactRemainingMs / 1000); 
        
        const elapsed = node.remaining - newRemaining;
        if (elapsed > 2) didCatchUp = true;

        // Akışkan süre senkronizasyonu (Smooth Catch-up)
        if (node.visualRemaining !== undefined && node.visualRemaining > newRemaining) {
            const gap = node.visualRemaining - newRemaining;
            node.visualRemaining -= Math.ceil(gap / 2);
            if (node.visualRemaining < newRemaining) node.visualRemaining = newRemaining;
        } else {
            node.visualRemaining = newRemaining;
        }

        if (!didCatchUp && elapsed === 1 && exactRemainingMs > 0 && exactRemainingMs <= 10000 && deltaMs < 2000) {
            if (newRemaining === 10 && node.remaining > 10) playCountdown('long');
            else if (newRemaining > 0 && newRemaining < 10 && node.remaining > newRemaining) playCountdown('short');
        }

        node.remaining = newRemaining;

        // Extension Badge Update
        if (exactRemainingMs >= 0) {
            let mins = Math.floor(newRemaining / 60);
            let badgeTxt = mins > 0 ? mins.toString() : (newRemaining > 0 ? '<1' : '0');
            updateExtensionBadge(badgeTxt, node.type);
        } else {
            updateExtensionBadge('', 'work');
        }

        const inTimeWindow = (exactRemainingMs <= 15000 && exactRemainingMs > -5000);
        const forcedWarning = (node.keepWarningUntil && node.keepWarningUntil > now);
        const shouldBeWarning = (node.type === 'work' && !node.wasSkipped && (inTimeWindow || forcedWarning));
        
        if (shouldBeWarning && !node.inWarningPhase) {
            node.inWarningPhase = true;
            timelineNeedsRender = true;
        } else if (!shouldBeWarning && node.inWarningPhase) {
            node.inWarningPhase = false;
            node.inCooldown = false;
            timelineNeedsRender = true;
        }

        if (shouldBeWarning && exactRemainingMs <= 0 && !node.inCooldown) {
            node.inCooldown = true;
        }

        if (exactRemainingMs <= -5000 || (exactRemainingMs <= 0 && (node.type !== 'work' || node.wasSkipped)) || (exactRemainingMs <= 0 && !shouldBeWarning)) {
            node.state = 'completed';
            node.inWarningPhase = false;
            node.inCooldown = false;
            node.visualRemaining = newRemaining < 0 ? newRemaining : 0; 
            node.remaining = newRemaining < 0 ? newRemaining : 0;
            timelineNeedsRender = true;
            lastCompletedType = node.type;
            
            let overflowMs = (exactRemainingMs < 0) ? -exactRemainingMs : 0;
            if (overflowMs > 5000) overflowMs = 5000;

            activeNodeIndex++;
            if (activeNodeIndex < nodes.length) {
                activateNode(activeNodeIndex);
                nodes[activeNodeIndex].expectedEndAt -= overflowMs;
                if (overflowMs > 0) {
                    nodes[activeNodeIndex].visualRemaining = nodes[activeNodeIndex].duration; 
                }
                if (!node.wasSkipped) {
                    fireNotification(lastCompletedType);
                    playAudioType = lastCompletedType;
                }
            } else {
                isRunning = false;
                timerWorker.postMessage('stop');
                releaseWakeLock();
                updateExtensionBadge('', 'work');
                manageStartButtonState();
                manageEmergencyButtonState();
                if (!node.wasSkipped) {
                    fireNotification(lastCompletedType);
                    playAudioType = lastCompletedType;
                }
                break;
            }
        } else {
            break;
        }
    }

    if (playAudioType) {
        playBeep(playAudioType);
    }

    if (timelineNeedsRender) {
        renderTimeline();
        scrollToActive();
    }
    
    updateActiveNodeDisplay();
    updateDisplays();
}

// ═══════════════════════════════════════════════════════
// DISPLAYS & SCROLL
// ═══════════════════════════════════════════════════════
function manageStartButtonState() {
    const startCont = document.getElementById('startContainer');
    if (!isRunning && startCont) {
        startCont.classList.remove('hidden');
    }

    const hasPendingNodes = nodes.some(n => n.state === 'pending' || n.state === 'active');

    if (nodes.length === 0 || !hasPendingNodes) {
        topStartBtn.disabled  = true;
        topStartBtn.className = "w-full bg-slate-700 text-slate-500 rounded-xl py-3 font-bold transition-all outline-none opacity-50 cursor-not-allowed";
        topStartBtn.textContent = 'SÜREYİ BAŞLAT';
    } else if (!isRunning) {
        topStartBtn.disabled  = false;
        
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
            topStartBtn.className = "w-full bg-emerald-600 text-white rounded-xl py-3 font-bold shadow-lg shadow-emerald-600/30 transition-colors active:scale-95 outline-none";
        } else {
            topStartBtn.className = "w-full bg-emerald-600 text-white rounded-xl py-3 font-bold shadow-lg shadow-emerald-900/50 transition-colors active:scale-95 outline-none";
        }
        topStartBtn.textContent = 'SÜREYİ BAŞLAT';
    }
}

function manageEmergencyButtonState() {
    const btn = document.getElementById('emergencyBtn');
    const isSessionActive = activeNodeIndex >= 0 && activeNodeIndex < nodes.length;
    
    if (isSessionActive) {
        btn.disabled = false;
        btn.classList.remove('opacity-30', 'pointer-events-none', 'grayscale');
    } else {
        btn.disabled = true;
        btn.classList.add('opacity-30', 'pointer-events-none', 'grayscale');
    }
}

function updateDisplays() {
    totalElapsedDisplay.textContent = formatTime(totalElapsedSeconds);
    totalWorkDisplay.textContent    = formatTime(totalWorkSeconds);
    
    let totalWorkPlanned = 0;
    let totalPlanned = 0;
    for (let i = 0; i < nodes.length; i++) {
        totalPlanned += nodes[i].duration;
        if (nodes[i].type === 'work') totalWorkPlanned += nodes[i].duration;
    }

    let displayEmergencyMs = emergencyBreakMs;
    if (isEmergencyBreak && emergencyBreakStartTime !== null) {
        displayEmergencyMs += Date.now() - emergencyBreakStartTime;
    }
    document.getElementById('emergencyTimeDisplay').textContent =
        `(+${formatMMSS(Math.floor(displayEmergencyMs / 1000))})`;

    const wMins = Math.floor(totalWorkPlanned / 60);
    const tMins = Math.floor(totalPlanned / 60);
    document.getElementById('sessionStatsDisplay').textContent = `W:${wMins} / T:${tMins}`;
}

function updateInputDisplay() {
    if (currentInputValue !== '') {
        inputDisplay.textContent = currentInputValue;
        inputDisplay.classList.remove('text-slate-500','opacity-50');
        inputDisplay.classList.add('text-slate-300');
    } else if (suggestedValue !== '') {
        inputDisplay.textContent = suggestedValue;
        inputDisplay.classList.remove('text-slate-300');
        inputDisplay.classList.add('text-slate-500','opacity-50');
    } else {
        inputDisplay.textContent = '0';
        inputDisplay.classList.remove('text-slate-500','opacity-50');
        inputDisplay.classList.add('text-slate-300');
    }
}

function scrollToBottom() {
    setTimeout(() => {
        timelineContainer.scrollTo({ top: timelineContainer.scrollHeight, behavior: 'smooth' });
    }, 50);
}

function scrollToActive() {
    setTimeout(() => {
        if (activeNodeIndex >= 0 && activeNodeIndex < nodes.length) {
            const activeEl = document.getElementById(`node-${nodes[activeNodeIndex].id}`);
            if (activeEl) {
                const containerRect = timelineContainer.getBoundingClientRect();
                const elRect = activeEl.getBoundingClientRect();
                const targetTop = timelineContainer.scrollTop + (elRect.top - containerRect.top) - 24;
                timelineContainer.scrollTo({ top: targetTop, behavior: 'smooth' });
            }
        } else {
            timelineContainer.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }, 50);
}

// ═══════════════════════════════════════════════════════
// INPUT & DRAGGABLE NUMPAD (Bottom Sheet)
// ═══════════════════════════════════════════════════════
function appendNum(num) {
    getAudioContext();
    if (currentInputValue.length < 4) { currentInputValue += num.toString(); updateInputDisplay(); }
}
function deleteNum() {
    getAudioContext();
    currentInputValue = currentInputValue.slice(0,-1); updateInputDisplay();
}

let numpadOpen = true;
let isDraggingNumpad = false;
let startNumpadY = 0;
let initialTranslateY = 0;

function setNumpadState(open) {
    const wasOpen = numpadOpen;
    numpadOpen = open;
    const contentHeight = numpadContent.offsetHeight;
    const wrapperHeight = numpadWrapper.offsetHeight;
    
    if (open) {
        timelineContainer.style.paddingBottom = (wrapperHeight + 24) + 'px';
    } else {
        timelineContainer.style.paddingBottom = '24px';
    }
    
    numpadWrapper.style.transition = 'transform 0.3s cubic-bezier(0.32, 0.72, 0, 1)';
    numpadWrapper.style.transform = `translateY(${open ? 0 : contentHeight}px)`;
    
    if (open && !wasOpen) {
        scrollToBottom();
    } else if (!open && wasOpen) {
        scrollToActive();
    }
}

function toggleNumpad() {
    setNumpadState(!numpadOpen);
}

dragHandle.addEventListener('click', () => {
    if (!isDraggingNumpad) toggleNumpad();
});

numpadWrapper.addEventListener('touchstart', e => {
    isDraggingNumpad = true;
    startNumpadY = e.touches[0].clientY;
    
    const style = window.getComputedStyle(numpadWrapper);
    const matrix = new WebKitCSSMatrix(style.transform);
    initialTranslateY = matrix.m42;
    
    numpadWrapper.style.transition = 'none';
}, {passive: true});

numpadWrapper.addEventListener('touchmove', e => {
    if (!isDraggingNumpad) return;
    e.preventDefault(); 
    const deltaY = e.touches[0].clientY - startNumpadY;
    let newY = initialTranslateY + deltaY;
    
    const contentHeight = numpadContent.offsetHeight;
    if (newY < 0) newY = 0; 
    if (newY > contentHeight) newY = contentHeight;
    
    numpadWrapper.style.transform = `translateY(${newY}px)`;
}, {passive: false});

numpadWrapper.addEventListener('touchend', e => {
    if (!isDraggingNumpad) return;
    isDraggingNumpad = false;
    
    const style = window.getComputedStyle(numpadWrapper);
    const matrix = new WebKitCSSMatrix(style.transform);
    const finalY = matrix.m42;
    const contentHeight = numpadContent.offsetHeight;
    
    if (numpadOpen) {
        if (finalY > contentHeight * 0.2) setNumpadState(false);
        else setNumpadState(true);
    } else {
        if (finalY < contentHeight * 0.8) setNumpadState(true);
        else setNumpadState(false);
    }
});

// ═══════════════════════════════════════════════════════
// EMERGENCY BREAK
// ═══════════════════════════════════════════════════════
function toggleEmergencyBreak() {
    getAudioContext();
    isEmergencyBreak = !isEmergencyBreak;

    const btn   = document.getElementById('emergencyBtn');
    const icon  = document.getElementById('emergencyIcon');
    const text  = document.getElementById('emergencyText');
    const disp  = document.getElementById('emergencyTimeDisplay');
    const dots  = icon.querySelectorAll('div');

    if (isEmergencyBreak) {
        emergencyBreakStartTime = Date.now();
        btn.classList.replace('text-red-500','text-emerald-500');
        btn.classList.replace('hover:text-red-400','hover:text-emerald-400');
        icon.className = "w-9 h-9 rounded-full bg-emerald-600/20 border border-emerald-500/50 flex items-center justify-center shadow-[0_0_15px_rgba(16,185,129,0.4)] relative group-active:scale-95 transition-transform";
        dots.forEach(d => d.classList.replace('bg-red-500','bg-emerald-500'));
        text.textContent = "DEVAM ET";
        disp.classList.remove('hidden');
        
        lastTickTime = Date.now();
        if (!isRunning) timerWorker.postMessage('start');
    } else {
        const pauseDuration = Date.now() - emergencyBreakStartTime;
        emergencyBreakMs += pauseDuration;
        
        const additionalSeconds = Math.floor(emergencyBreakMs / 1000);
        totalElapsedSeconds += additionalSeconds;
        
        emergencyBreakMs = 0;
        emergencyBreakStartTime = null;

        if (isRunning && activeNodeIndex >= 0 && activeNodeIndex < nodes.length) {
            nodes[activeNodeIndex].expectedEndAt += pauseDuration;
        }

        btn.classList.replace('text-emerald-500','text-red-500');
        btn.classList.replace('hover:text-emerald-400','hover:text-red-400');
        icon.className = "w-9 h-9 rounded-full bg-red-600/20 border border-red-500/50 flex items-center justify-center shadow-[0_0_15px_rgba(220,38,38,0.4)] relative group-active:scale-95 transition-transform";
        dots.forEach(d => d.classList.replace('bg-emerald-500','bg-red-500'));
        text.textContent = "ACİL MOLA";
        
        disp.classList.add('hidden');
        disp.textContent = '(+00:00)';
        
        lastTickTime = Date.now();
        if (!isRunning) timerWorker.postMessage('stop');
        
        updateDisplays();
    }
    
    setNumpadState(false);
}

// ═══════════════════════════════════════════════════════
// SUGGESTION
// ═══════════════════════════════════════════════════════
function recalculateSuggestionState() {
    const sequence = [1, 1, 1, 1, 2, 2, 2, 2, 4, 4];
    const step = nodes.length;

    if (step === 0) {
        nextNodeType = 'work';
        suggestedValue = '1';
        isSequenceBroken = false;
    } else {
        const last = nodes[nodes.length - 1];
        
        if (last.type === 'work') {
            nextNodeType = 'break';
            
            if (!isSequenceBroken && step < sequence.length) {
                suggestedValue = sequence[step].toString();
            } else {
                const wMins = last.duration / 60;
                if (wMins <= 8) {
                    suggestedValue = Math.max(1, Math.ceil(wMins / 2)).toString();
                } else {
                    const lb = [...nodes].reverse().find(n => n.type === 'break');
                    const bMins = lb ? lb.duration / 60 : 0;
                    suggestedValue = Math.max(1, Math.round(wMins/3 + 1 + 0.2*bMins)).toString();
                }
            }
        } else {
            nextNodeType = 'work';
            
            if (!isSequenceBroken && step < sequence.length) {
                suggestedValue = sequence[step].toString();
            } else {
                const lw = [...nodes].reverse().find(n => n.type === 'work');
                if (lw) {
                    const m = lw.duration / 60;
                    if (m <= 4)       suggestedValue = Math.max(1, Math.round(m*2)).toString();
                    else if (m < 30)  suggestedValue = Math.max(m+1, Math.round(-0.0152*m*m + 1.488*m + 2.112)).toString();
                    else              suggestedValue = Math.max(m+1, Math.round(m*1.1)).toString();
                } else {
                    suggestedValue = '1';
                }
            }
        }
    }

    const btn   = document.getElementById('toggleAddBtn');
    const shape = document.getElementById('toggleAddShape');
    const ttxt  = document.getElementById('toggleAddText');
    if (nextNodeType === 'work') {
        btn.className   = "bg-indigo-600 text-white rounded-2xl py-4 text-xs font-bold shadow-lg shadow-indigo-900/50 transition-transform active:scale-95 flex flex-col items-center justify-center gap-1 outline-none";
        
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
             btn.classList.replace('shadow-indigo-900/50', 'shadow-indigo-600/30');
        }
        
        shape.className = "w-4 h-4 bg-white rounded-md shadow-sm";
        ttxt.textContent = "ÇALIŞMA EKLE";
    } else {
        btn.className   = "bg-teal-600 text-white rounded-2xl py-4 text-xs font-bold shadow-lg shadow-teal-900/50 transition-transform active:scale-95 flex flex-col items-center justify-center gap-1 outline-none";
        
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
             btn.classList.replace('shadow-teal-900/50', 'shadow-teal-600/30');
        }
        
        shape.className = "w-4 h-4 bg-white rounded-full shadow-sm";
        ttxt.textContent = "MOLA EKLE";
    }
    updateInputDisplay();
    manageStartButtonState();
}

function handleAddToggle() {
    getAudioContext();
    let minutes = parseInt(currentInputValue, 10);
    if (isNaN(minutes) || minutes <= 0) {
        if (suggestedValue) {
            minutes = parseInt(suggestedValue, 10);
        } else return;
    } else {
        if (suggestedValue && minutes !== parseInt(suggestedValue, 10)) {
            isSequenceBroken = true;
        }
    }
    addNode(nextNodeType, minutes);
    currentInputValue = '';
    recalculateSuggestionState();
}

// ═══════════════════════════════════════════════════════
// DELETE
// ═══════════════════════════════════════════════════════
function promptDeleteLastNode() {
    if (nodes.length === 0) return;
    
    const lastNode = nodes[nodes.length - 1];
    if (isRunning && lastNode.state === 'active') return;

    isConfirmDeleteOpen = true;
    const modal = document.getElementById('deleteConfirmModal');
    const card  = document.getElementById('deleteConfirmCard');
    modal.classList.remove('hidden');
    setTimeout(() => {
        modal.classList.remove('opacity-0');
        card.classList.remove('scale-95');
        document.getElementById('confirmDeleteYesBtn').focus();
    }, 10);
}
function closeDeleteConfirm() {
    isConfirmDeleteOpen = false;
    const modal = document.getElementById('deleteConfirmModal');
    const card  = document.getElementById('deleteConfirmCard');
    modal.classList.add('opacity-0');
    card.classList.add('scale-95');
    setTimeout(() => modal.classList.add('hidden'), 200);
    if (document.activeElement) document.activeElement.blur();
}
function executeDeleteLastNode() {
    if (nodes.length > 0) deleteNode(nodes[nodes.length - 1].id);
    closeDeleteConfirm();
}

function deleteNode(id) {
    const index = nodes.findIndex(n => n.id === id);
    if (index === -1) return;
    const wasActive = index === activeNodeIndex;
    nodes.splice(index, 1);
    if (index < activeNodeIndex) activeNodeIndex--;

    if (wasActive) {
        if (activeNodeIndex < nodes.length) {
            activateNode(activeNodeIndex);
        } else {
            activeNodeIndex = -1;
            if (isRunning) {
                isRunning = false;
                timerWorker.postMessage('stop');
                releaseWakeLock();
                updateExtensionBadge('', 'work');
            }
            manageStartButtonState();
            manageEmergencyButtonState();
        }
    }
    renderTimeline();
    recalculateSuggestionState();
    updateDisplays();
}

// ═══════════════════════════════════════════════════════
// TIMELINE RENDER (Dynamic +1 DK Styling)
// ═══════════════════════════════════════════════════════
function renderTimeline() {
    nodesWrapper.innerHTML = `<div class="absolute left-7 top-0 -bottom-[50px] w-px border-l-2 border-dashed border-slate-700 z-0"></div>`;
    if (nodes.length === 0) {
        nodesWrapper.innerHTML += `
            <div class="flex items-center gap-6 opacity-50 relative z-10">
                <div class="w-14 flex justify-center"><div class="w-3 h-3 bg-slate-600 rounded-full z-10"></div></div>
                <div class="text-slate-500 text-sm">Bekleniyor... Aşağıdan süre ekleyin.</div>
            </div>`;
        return;
    }
    
    let wCount = 0;
    let bCount = 0;
    let isLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
    
    nodes.forEach((node, index) => {
        const el = document.createElement('div');
        
        const isWarning = node.inWarningPhase;

        el.className = `flex items-center gap-6 transition-all duration-500 ease-in-out relative z-10 ${node.state==='completed' ? 'completed-node' : ''}`;
        el.id = `node-${node.id}`;
        const shapeClass = node.type === 'work' ? 'rounded-2xl' : 'rounded-full';
        
        let bgClass = "";
        if (isLight) {
            bgClass = node.type === 'work' ? 'bg-indigo-600 shadow-indigo-600/30' : 'bg-teal-600 shadow-teal-600/30';
        } else {
            bgClass = node.type === 'work' ? 'bg-indigo-600 shadow-indigo-900/50' : 'bg-teal-600 shadow-teal-900/50';
        }
        
        let activeClass = node.state === 'active' && !isWarning ? 'active-node' : '';
        const colorClass  = node.type === 'work' ? 'text-indigo-500' : 'text-teal-500';
        const label       = node.type === 'work' ? 'Çalışma' : 'Mola';
        
        let badgeCount = 0;
        if (node.type === 'work') {
            wCount++;
            badgeCount = wCount;
        } else {
            bCount++;
            badgeCount = bCount;
        }
        const badge = (node.type === 'work' ? 'W' : 'B') + badgeCount;

        if (isWarning) {
            const rawSecs = node.visualRemaining !== undefined ? node.visualRemaining : node.remaining;
            const displaySecs = Math.max(0, rawSecs);
            
            let nextDisplay = (node.addedMinutes || 0) + 1;
            if (nextDisplay > 5) nextDisplay = 5;
            let addedText = `+${nextDisplay} DK`;
            let pointerClass = (node.addedMinutes >= 5) ? 'pointer-events-none' : '';
            
            el.innerHTML = `
                <div class="relative flex-shrink-0 flex justify-center w-14">
                    <div class="w-14 h-14 ${shapeClass} ${bgClass} shadow-lg flex items-center justify-center z-10 warning-node">
                        <span class="font-bold text-xs text-white opacity-70 keep-white">${badge}</span>
                    </div>
                </div>
                <div class="flex items-center w-full warning-bg text-white p-4 rounded-2xl cursor-pointer warning-node transition-colors duration-300 select-none ${pointerClass}" onclick="addOneMinute('${node.id}', this)">
                    <div class="flex-1 flex justify-between items-center pr-2 pointer-events-none">
                        <div class="flex flex-col">
                            <span class="font-bold uppercase text-sm text-amber-100">${label}</span>
                            <div class="text-3xl font-bold font-mono tracking-tighter leading-none" id="time-${node.id}">
                                ${formatMMSS(displaySecs)}
                            </div>
                        </div>
                        <div class="add-btn-text text-3xl font-black tracking-tight drop-shadow-md transition-all duration-200">${addedText}</div>
                    </div>
                </div>`;
        } else {
            let wrapperBgClass = 'bg-slate-800/80 border-slate-700/50';
            if (isLight) wrapperBgClass = 'bg-white border-slate-200';
            
            const isLast = index === nodes.length - 1;
            const showDelete = isLast && !(isRunning && node.state === 'active');
            
            const delBtn = showDelete ? `
                <button onclick="executeDeleteLastNode()" class="p-2 text-slate-600 hover:text-red-500 hover:bg-slate-700/50 rounded-xl transition-all active:scale-90 outline-none flex items-center justify-center flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>` : '';

            const skipBtnClass = isLight ? "px-3 py-1.5 bg-slate-300 text-slate-800 hover:bg-slate-400 text-xs font-bold rounded-lg transition-all active:scale-95 outline-none whitespace-nowrap" : "px-3 py-1.5 bg-slate-200 text-slate-900 hover:bg-white text-xs font-bold rounded-lg transition-all active:scale-95 outline-none shadow-md whitespace-nowrap";
            const skipBtn = (node.state === 'active') ? `<button onclick="skipActiveNode()" class="${skipBtnClass}">ATLA</button>` : '';

            const rawSecs = node.visualRemaining !== undefined ? node.visualRemaining : node.remaining;
            const displaySecs = Math.max(0, rawSecs);

            el.innerHTML = `
                <div class="relative flex-shrink-0 flex justify-center w-14">
                    <div class="w-14 h-14 ${shapeClass} ${bgClass} shadow-lg flex items-center justify-center z-10 ${activeClass}">
                        <span class="text-white font-bold text-xs opacity-70 keep-white">${badge}</span>
                    </div>
                </div>
                <div class="flex items-center w-full ${wrapperBgClass} p-4 rounded-2xl border transition-colors duration-300 min-w-0">
                    <div class="flex-1 flex flex-col justify-center min-w-0">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold tracking-wide ${colorClass} uppercase text-sm">${label}</span>
                            <span class="text-xs text-slate-500 font-medium whitespace-nowrap ml-2">${node.duration/60} dk</span>
                        </div>
                        <div class="flex justify-between items-center w-full mt-1">
                            <div class="text-3xl font-bold font-mono tracking-tighter text-slate-300 leading-none truncate" id="time-${node.id}">
                                ${formatMMSS(displaySecs)}
                            </div>
                            <div class="flex items-center gap-2 ml-3">
                                ${skipBtn}
                                ${delBtn}
                            </div>
                        </div>
                    </div>
                </div>`;
        }
        nodesWrapper.appendChild(el);
    });
}

function updateActiveNodeDisplay() {
    if (activeNodeIndex >= 0 && activeNodeIndex < nodes.length) {
        const node = nodes[activeNodeIndex];
        const el = document.getElementById(`time-${node.id}`);
        if (el) {
            const rawSecs = node.visualRemaining !== undefined ? node.visualRemaining : node.remaining;
            const displaySecs = Math.max(0, rawSecs);
            el.textContent = formatMMSS(displaySecs);
        }
    }
}

// ═══════════════════════════════════════════════════════
// ADD NODE
// ═══════════════════════════════════════════════════════
function addNode(type, minutes) {
    if (isNaN(minutes) || minutes <= 0) return;
    const newNode = {
        id: Date.now() + Math.random().toString(36).slice(2,9),
        type, duration: minutes*60, remaining: minutes*60, state: 'pending',
        expectedEndAt: 0, inWarningPhase: false, inCooldown: false, wasSkipped: false
    };
    nodes.push(newNode);
    if (isRunning && activeNodeIndex >= nodes.length - 1) {
        activeNodeIndex = nodes.length - 1;
        activateNode(activeNodeIndex);
    }
    renderTimeline();
    manageStartButtonState();
    updateDisplays();
    
    if (numpadOpen) {
        scrollToBottom();
    }
}

// ═══════════════════════════════════════════════════════
// START TIMER
// ═══════════════════════════════════════════════════════
function startGlobalTimer() {
    if (nodes.length === 0 || isRunning) return;
    if (activeNodeIndex >= nodes.length) return;

    getAudioContext();
    requestNotificationPermission();
    acquireWakeLock();

    isRunning = true;
    lastTickTime = Date.now();
    remainderMs = 0;

    const startCont = document.getElementById('startContainer');
    if(startCont) startCont.classList.add('hidden');

    if (activeNodeIndex < 0 || nodes[activeNodeIndex].state === 'pending') {
        if (activeNodeIndex < 0) activeNodeIndex = 0;
        activateNode(activeNodeIndex); 
        renderTimeline();
    }
    
    manageEmergencyButtonState();
    timerWorker.postMessage('start');
    
    setNumpadState(false);
}

// ═══════════════════════════════════════════════════════
// KEYBOARD & EVENTS
// ═══════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    getAudioContext();
    
    if (e.code === 'Space') {
        e.preventDefault();
        if (document.activeElement) document.activeElement.blur();
        toggleNumpad();
        return;
    }

    if (isConfirmDeleteOpen) {
        if (e.key === 'Enter')   { executeDeleteLastNode(); e.preventDefault(); }
        if (e.key === 'Escape')  { closeDeleteConfirm();   e.preventDefault(); }
        return;
    }
    
    if (e.key >= '0' && e.key <= '9') appendNum(parseInt(e.key));
    else if (e.key === 'Backspace')   deleteNum();
    else if (e.key === 'Delete')      { promptDeleteLastNode(); e.preventDefault(); }
    else if (e.key === 'Enter') {
        e.preventDefault();
        if (numpadOpen) {
            handleAddToggle();
        } else {
            if (!isRunning) {
                const hasPendingNodes = nodes.some(n => n.state === 'pending' || n.state === 'active');
                if (nodes.length > 0 && hasPendingNodes) {
                    startGlobalTimer();
                }
            } else {
                if (activeNodeIndex >= 0 && activeNodeIndex < nodes.length) {
                    const activeNode = nodes[activeNodeIndex];
                    if (activeNode.inWarningPhase) {
                        const nodeEl = document.getElementById(`node-${activeNode.id}`);
                        const btnEl = nodeEl ? nodeEl.querySelector('.warning-bg') : null;
                        addOneMinute(activeNode.id, btnEl);
                    } else {
                        skipActiveNode();
                    }
                }
            }
        }
    }
});

window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', e => {
    renderTimeline();
    recalculateSuggestionState();
    manageStartButtonState();
});

window.addEventListener('beforeunload', (e) => {
    const hasActiveOrPending = nodes.some(n => n.state === 'active' || n.state === 'pending');
    if (hasActiveOrPending) {
        e.preventDefault();
        e.returnValue = ''; 
    }
});

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
recalculateSuggestionState();
renderTimeline();
updateInputDisplay();
manageStartButtonState();
manageEmergencyButtonState();
updateDisplays();

setTimeout(() => {
    setNumpadState(true);
}, 50);

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        if (window.location.protocol === 'https:' || window.location.protocol === 'http:' || window.location.hostname === 'localhost') {
            navigator.serviceWorker.register('./sw.js', {scope:'./'})
                .then(r => console.log('SW registered:', r.scope))
                .catch(e => console.warn('SW error:', e));
        }
    });
}
</script>
</body>
</html>
